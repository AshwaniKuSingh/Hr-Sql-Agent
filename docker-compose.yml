services:
  db:
    image: postgres:16
    container_name: hr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: hr-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  agent:
    build: ./agent
    container_name: hr-agent
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    volumes:
      - schema_cache:/cache
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: ./api
    container_name: hr-api
    environment:
      AGENT_HOST: http://agent:8001
    networks:
      - frontend_net
      - backend_net
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost/api
    container_name: hr-frontend
    networks:
      - frontend_net

  nginx:
    build: ./nginx
    container_name: hr-nginx
    ports:
      - "80:80"
    networks:
      - frontend_net
    depends_on:
      - frontend
      - api

volumes:
  pg_data:
  ollama_data:
  schema_cache:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge