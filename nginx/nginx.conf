events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server hr-frontend:80;
    }

    upstream api {
        server hr-api:8000;
        server hr-api:8000;
        server hr-api:8000;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}